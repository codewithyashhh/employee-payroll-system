{% extends 'base.html' %}{% block content %}
<h1>Leave Management</h1>
<form method="post" class="card grid2">
<select name="employee_id" required><option value="">Employee</option>{% for e in employees %}<option value="{{e.id}}">{{e.employee_code}} - {{e.name}}</option>{% endfor %}</select>
<select name="leave_type" required><option>CL</option><option>SL</option><option>CPL</option><option>OD</option></select>
<input type="date" name="start_date" required><input type="date" name="end_date" required>
<input type="number" step="0.5" name="days" placeholder="Days" required><input name="reason" placeholder="Reason"><button>Request Leave</button>
</form>
<table><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th></tr>{% for r in records %}<tr><td>{{r.employee_id}}</td><td>{{r.leave_type}}</td><td>{{r.start_date}}</td><td>{{r.end_date}}</td><td>{{r.days}}</td><td>{{r.status}}</td></tr>{% endfor %}</table>
{% endblock %}
