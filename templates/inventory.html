<!DOCTYPE html>
<html>
<head>
<title>Inventory</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<div class="sidebar">
<a href="/dashboard">Dashboard</a>
<a href="/billing">Billing</a>
<a href="/inventory">Inventory</a>
</div>

<div class="main">

<h2>Inventory</h2>

<form method="POST">
<input name="item" placeholder="Item">
<input name="quantity" type="number" placeholder="Quantity">
<button>Add</button>
</form>

<table style="text-align: center;">
<tr>
<th>Item</th>
<th>Qty</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for i in items %}
<tr>
<td style="text-align: center;">{{i.item}}</td>
<td style="text-align: center;">{{i.quantity}}</td>

<td>
{% if i.quantity < 5 %}
<span style="color:red;">Low</span>
{% else %}
OK
{% endif %}
</td>

<td>
<a href="/delete_item/{{i.id}}" class="btn btn-delete">Delete</a>
{% if session['user_id'] == 2 %}
<a href="/edit_item/{{i.id}}" class="btn btn-edit">Edit</a>
{% endif %}
</td>

</tr>
{% endfor %}
</table>

</div>

</body>
</html>
