{% extends 'base.html' %}{% block content %}
<h1>Attendance</h1>
<form method="post" class="card grid2">
<select name="employee_id" required><option value="">Employee</option>{% for e in employees %}<option value="{{e.id}}">{{e.employee_code}} - {{e.name}}</option>{% endfor %}</select>
<input type="date" name="attendance_date" required>
<select name="status" required><option>Present</option><option>Absent</option><option>Half-day</option></select>
<select name="worked_shift_id"><option value="">Worked Shift</option>{% for s in shifts %}<option value="{{s.id}}">{{s.name}}</option>{% endfor %}</select>
<input type="number" step="0.5" name="overtime_hours" placeholder="Overtime Hours">
<button>Save Attendance</button></form>
<table><tr><th>Date</th><th>Employee</th><th>Status</th><th>OT</th></tr>{% for r in records %}<tr><td>{{r.attendance_date}}</td><td>{{r.employee_id}}</td><td>{{r.status}}</td><td>{{r.overtime_hours}}</td></tr>{% endfor %}</table>
{% endblock %}
